<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Releases - Gurraj Grewal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="favicon.png">

<style>
.navbar {
    position: absolute;
    top: 0;
    width: 100%;
    z-index: 10;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);
}

.nav-center {
    display: flex;
    gap: 10px;
    list-style: none;
    margin: 0;
    padding: 10px 20px;
}

.nav-center li a {
    padding: 10px 16px;
    border-radius: 999px;
    color: white;
    text-decoration: none;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
}

/* SEASONS DROPDOWN */
.season-dropdown {
    position: relative;
    display: inline-block;
}

.season-menu {
    display: none;
    position: absolute;
    top: 45px;
    left: 0;
    background: rgba(0,0,0,0.9);
    border-radius: 10px;
    min-width: 180px;
    overflow: hidden;
    z-index: 999;
}

.season-menu button {
    width: 100%;
    padding: 10px;
    background: none;
    border: none;
    color: white;
    text-align: left;
    cursor: pointer;
}

.season-menu button:hover {
    background: rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<header class="navbar">
    <ul class="nav-center">
        <li><a href="home.html">HOME</a></li>
        <li><a href="releases.html">RELEASES</a></li>
    </ul>
</header>

<section class="release-feature">

<div class="release-slider" id="slider">

<!-- SLIDE 1 -->
<div class="release-slide">
<div class="release-bg" style="background-image:url('HCMArt.png')"></div>

<div class="release-overlay">
<div class="release-left">

<div class="release-meta">
<span>6.2 • 2022 • Seasons</span>
</div>

<div class="release-logo">
<img src="HCMLogo.png">
</div>

<div class="release-description">
<p>Violethyst and Sibashi enter each match with one goal: survive.</p>
</div>

<div class="release-buttons">
<button onclick="playCurrentSeries()">▶ Play</button>

<div class="season-dropdown">
<button onclick="toggleSeasons()">Seasons ▾</button>
<div id="seasonMenu" class="season-menu"></div>
</div>

</div>

</div>
</div>
</div>

<!-- SLIDE 2 -->
<div class="release-slide">
<div class="release-bg" style="background-image:url('PRE-PARTYART.png')"></div>
<div class="release-overlay"></div>
</div>

<!-- SLIDE 3 -->
<div class="release-slide">
<div class="release-bg" style="background-image:url('HCMAArt.png')"></div>
<div class="release-overlay"></div>
</div>

</div>

<div class="arrow-controls">
<button class="prev">‹</button>
<button class="next">›</button>
</div>

</section>

<section class="episodes-section">

<div class="episodes-header">
<h2 class="episodes-title">Season 1</h2>
</div>

<div class="episodes-wrapper">
<div class="episodes-track" id="episodesTrack"></div>
</div>

</section>

<div id="videoModal" style="display:none">
<iframe id="videoFrame"></iframe>
</div>

<script>

/* ================= SLIDER ================= */

const slider = document.getElementById("slider");
const slides = document.querySelectorAll(".release-slide");

let currentIndex = 0;

document.querySelector(".next").onclick = () => {
    currentIndex = (currentIndex + 1) % slides.length;
    updateSlider();
};

document.querySelector(".prev").onclick = () => {
    currentIndex = (currentIndex - 1 + slides.length) % slides.length;
    updateSlider();
};

function updateSlider() {
    slider.style.transform = `translateX(-${currentIndex * 100}%)`;
    onSeriesChange(currentIndex);
}

/* ================= SERIES DATA ================= */

const seriesData = {
0: {
    seasons: {
        1: {
            name: "Season 1",
            episodes: [
                {title:"Couloir",img:"hcmEP1.png"},
                {title:"Japan",img:"hcmEP2.png"}
            ],
            videos: [
                "https://www.youtube.com/embed/HmVeA0c8IHI",
                "https://www.youtube.com/embed/omC2tyNmGT8"
            ]
        },
        2: {
            name: "Season 2 (Anniversary)",
            episodes: [
                {title:"Good Days",img:"hcmaEP1.png"},
                {title:"Behold",img:"hcmaEP3.png"}
            ],
            videos: [
                "https://www.youtube.com/embed/v_4zKKeNzm0",
                "https://www.youtube.com/embed/ycxLI4GxUwM"
            ]
        }
    }
}
};

let currentSeries = 0;
let currentSeason = 1;

/* ================= SEASONS ================= */

function toggleSeasons() {
    const menu = document.getElementById("seasonMenu");
    menu.innerHTML = "";

    Object.keys(seriesData[currentSeries].seasons).forEach(key => {
        const btn = document.createElement("button");

        btn.textContent = seriesData[currentSeries].seasons[key].name;

        btn.onclick = () => {
            currentSeason = key;
            generateEpisodes();
            menu.style.display = "none";
        };

        menu.appendChild(btn);
    });

    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* ================= EPISODES ================= */

const episodesTrack = document.getElementById("episodesTrack");

function generateEpisodes() {

const season = seriesData[currentSeries].seasons[currentSeason];

episodesTrack.innerHTML = "";

document.querySelector(".episodes-title").textContent = season.name;

season.episodes.forEach((ep,i)=>{

const card = document.createElement("div");

card.innerHTML = `
<div>
<img src="${ep.img}">
<div>${ep.title}</div>
</div>
`;

card.onclick = () => openVideo(season.videos[i]);

episodesTrack.appendChild(card);

});

}

/* ================= SERIES CHANGE ================= */

function onSeriesChange(index) {
    currentSeries = index;
    currentSeason = 1;
    generateEpisodes();
}

/* ================= VIDEO ================= */

function openVideo(url) {
    document.getElementById("videoFrame").src = url;
    document.getElementById("videoModal").style.display = "flex";
}

function playCurrentSeries() {
    const season = seriesData[currentSeries].seasons[currentSeason];
    openVideo(season.videos[0]);
}

/* INIT */

updateSlider();

</script>

</body>
</html>
