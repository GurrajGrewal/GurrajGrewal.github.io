<!-- ✅ FIXED: BOTH SCRIPTS INSIDE BODY -->

<script>
const slider = document.getElementById("slider");
const slides = document.querySelectorAll(".release-slide");
const nextBtn = document.querySelector(".next");
const prevBtn = document.querySelector(".prev");

let currentIndex = 0;

function updateSlider() {
    const slideWidth = slides[0].clientWidth;
    slider.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
}

nextBtn.addEventListener("click", () => {
    currentIndex = (currentIndex + 1) % slides.length;
    updateSlider();
});

prevBtn.addEventListener("click", () => {
    currentIndex = (currentIndex - 1 + slides.length) % slides.length;
    updateSlider();
});

window.addEventListener("resize", updateSlider);
updateSlider();
</script>

<script>
const episodeData = {
    0: [
        { title: "Couloir", img: "hcmEP1.png" },
        { title: "Japan & Shiawase", img: "hcmEP2.png" },
        { title: "Tell Me A Joke", img: "hcmEP3.png" },
        { title: "Under My Skin", img: "hcmEP4.png" },
        { title: "My Eyes", img: "hcmEP5.png" },
        { title: "Lean Wit Me", img: "hcmEP6.png" },
        { title: "Dustcutter", img: "hcmEP7.png" },
        { title: "Always Be My Fault", img: "hcmEP8.png" },
        { title: "Cinderella", img: "hcmEP9.png" },
        { title: "Drugs You Should Try It", img: "hcmEP10.png" }
    ],
    1: [
        { title: "Until We're Skin & Bones", img: "preEP1.png" },
        { title: "Baptized In Fear", img: "preEP2.png" },
        { title: "Open Hearts", img: "preEP3.png" },
        { title: "Opening Night", img: "preEP4.png" },
        { title: "Reflections Laughing", img: "preEP5.png" },
        { title: "Baptized In Fear & Open Hearts Mashup", img: "preEP6.png" },
        { title: "Dancing In The Flames", img: "preEP7.png" }
    ],
    2: [
        { title: "Good Days In Speedway", img: "hcmaEP1.png" },
        { title: "Verglas: Couloir Mountains Revisited", img: "hcmaEP2.png" },
        { title: "Behold", img: "hcmaEP3.png" },
        { title: "My Soul", img: "hcmaEP4.png" }
    ]
};

const episodesTrack = document.getElementById("episodesTrack");
const leftArrow = document.querySelector(".ep-arrow.left");
const rightArrow = document.querySelector(".ep-arrow.right");

let episodeScrollIndex = 0;

function generateEpisodes(slideIndex) {
    episodesTrack.innerHTML = "";
    episodeScrollIndex = 0;

    const episodes = episodeData[slideIndex];

    episodes.forEach((ep, i) => {
        const card = document.createElement("div");
        card.className = "episode-card";

        card.innerHTML = `
            <div class="episode-thumb">
                <img src="${ep.img}">
                <div class="play-overlay"></div>
            </div>
            <div class="episode-info">
                <div class="episode-number">Episode ${i + 1}:</div>
                <div class="episode-title">${ep.title}</div>
            </div>
        `;

        episodesTrack.appendChild(card);
    });
}

generateEpisodes(0);
</script>
