<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Announcements - Gurraj Grewal</title>

    <!-- SAME FONT AS HOME -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: black;
            color: white;
        }

        /* BACKGROUND IMAGE */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: url('DaytonaFull.png') center/cover no-repeat;
            z-index: -1;
        }

        /* NAVBAR (IDENTICAL TO HOME) */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;

            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .nav-center {
            display: flex;
            gap: 10px;
            list-style: none;
            margin: 0;
            padding: 10px 20px;
        }

        .nav-center li a {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 999px;

            color: white;
            text-decoration: none;
            font-weight: 500;

            transition: all 0.2s ease;
        }

        .nav-center li a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ACTIVE PAGE */
        .nav-center li a[href="announcements.html"] {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>

<div class="bg"></div>

<header class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="logo-big-tran.png" alt="Logo">
        </a>
    </div>

    <ul class="nav-center">

        <li><a href="releases.html">RELEASES</a></li>
        <li><a href="announcements.html">ANNOUNCEMENTS</a></li>
        <li><a href="watch.html">WATCH & RATINGS</a></li>
    </ul>
</header>

</body>
</html>
