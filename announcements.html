<!DOCTYPE html>
<html>
<head>
    <title>Announcements - Gurraj Grewal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
        }

        /* FULL SCREEN BACKGROUND IMAGE */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: url('DaytonaCover.png') center/cover no-repeat;
            z-index: -1;
        }

        /* NAVBAR GLASS + ROUNDED + CENTERED */
        .navbar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1100px;

            display: flex;
            align-items: center;

            padding: 12px 25px;

            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            border-radius: 20px;

            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        }

        /* LOGO SIZE + SPACING */
        .logo img {
            height: 40px;
            display: block;
        }

        /* PUSH NAV LINKS TO RIGHT (FIXES CLASH) */
        .nav-center {
            display: flex;
            gap: 20px;
            list-style: none;
            margin: 0;
            padding: 0;

            margin-left: auto;   /* 🔥 KEY FIX */
        }

        /* BIGGER HITBOX LINKS */
        .nav-center li a {
            display: block;
            padding: 10px 14px;
            border-radius: 12px;

            color: white;
            text-decoration: none;
            font-weight: 500;

            transition: 0.2s ease;
        }

        /* HOVER EFFECT */
        .nav-center li a:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>

<!-- BACKGROUND IMAGE -->
<div class="bg"></div>

<!-- NAVBAR -->
<header class="navbar">

    <div class="logo">
        <a href="home.html">
            <img src="logo-big-tran.png" alt="Logo">
        </a>
    </div>

    <ul class="nav-center">
        <li><a href="home.html">HOME</a></li>
        <li><a href="releases.html">RELEASES</a></li>
        <li><a href="announcements.html">ANNOUNCEMENTS</a></li>
        <li><a href="watch.html">WATCH & RATINGS</a></li>
    </ul>

</header>

</body>
</html>
