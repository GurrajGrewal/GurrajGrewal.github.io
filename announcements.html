<!DOCTYPE html>
<html>
<head>
    <title>Announcements - Gurraj Grewal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
        }

        /* FULL SCREEN BACKGROUND IMAGE */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: url('DaytonaFull.png') center/cover no-repeat;
            z-index: -1;
        }

        /* TRANSPARENT GLASS NAVBAR */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;

            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* NAV CONTAINER */
        .nav-center {
            display: flex;
            gap: 10px; /* spacing between items */
            list-style: none;
            margin: 0;
            padding: 10px 20px;
        }

        /* MAKE LINKS BIGGER + BUTTON-LIKE */
        .nav-center li a {
            display: inline-block;
            padding: 10px 16px;   /* 👈 BIGGER HITBOX */
            border-radius: 999px; /* 👈 fully rounded pill */

            color: white;
            text-decoration: none;
            font-weight: 500;

            transition: all 0.2s ease;
        }

        /* HOVER BACKGROUND */
        .nav-center li a:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

<!-- BACKGROUND IMAGE -->
<div class="bg"></div>

<!-- NAVBAR -->
<header class="navbar">

    <div class="logo">
        <a href="home.html">
            <img src="logo-big-tran.png" alt="Logo">
        </a>
    </div>

    <ul class="nav-center">
        <li><a href="home.html">HOME</a></li>
        <li><a href="releases.html">RELEASES</a></li>
        <li><a href="announcements.html">ANNOUNCEMENTS</a></li>
        <li><a href="watch.html">WATCH & RATINGS</a></li>
    </ul>

</header>

</body>
</html>
