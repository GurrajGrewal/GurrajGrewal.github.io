<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reviews - Gurraj Grewal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* NAVBAR */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .nav-center {
            display: flex;
            gap: 10px;
            list-style: none;
            margin: 0;
            padding: 10px 20px;
        }

        .nav-center li a {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 999px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-center li a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-center li a[href="reviews.html"] {
            background: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #080808;
            color: white;
        }

        /* ── PAGE LAYOUT ── */
        .reviews-page {
            padding: 100px 60px 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── PAGE HEADER ── */
        .reviews-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .reviews-header-left h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 4px 0;
        }

        .reviews-header-left p {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            margin: 0;
            letter-spacing: 0.02em;
        }

        /* ── SORT / FILTER BAR ── */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 7px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.55);
            font-size: 12px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .filter-chip:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .filter-chip.active {
            background: white;
            color: black;
            border-color: white;
        }

        /* ── ARTIST VIEW HEADER ── */
        .artist-header {
            display: none;
            align-items: center;
            gap: 18px;
            margin-bottom: 32px;
            padding: 20px 24px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
        }

        .artist-header.visible {
            display: flex;
        }

        .artist-header-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            flex-shrink: 0;
            color: rgba(255,255,255,0.7);
        }

        .artist-header-info h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 2px 0;
        }

        .artist-header-info p {
            font-size: 12px;
            color: rgba(255,255,255,0.35);
            margin: 0;
        }

        .artist-back {
            margin-left: auto;
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 12px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .artist-back:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        /* ── DIVIDER ── */
        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        /* ── REVIEW GRID ── */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }

        /* ── REVIEW CARD ── */
        .review-card {
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .review-card:hover {
            transform: translateY(-3px);
        }

        .review-card:hover .review-thumb {
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }

        .review-thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            overflow: hidden;
            background: #1a1a1a;
            position: relative;
            margin-bottom: 12px;
            transition: box-shadow 0.2s ease;
        }

        .review-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Score badge */
        .review-score {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 4px 9px;
            font-size: 13px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .review-score img {
            width: 12px;
            height: 12px;
            object-fit: contain;
        }

        .review-info {
            padding: 0 2px;
        }

        .review-album {
            font-size: 14px;
            font-weight: 600;
            color: white;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .review-artist {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            display: inline-block;
            transition: color 0.2s;
        }

        .review-artist:hover {
            color: rgba(255,255,255,0.9);
            text-decoration: underline;
        }

        .review-meta {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            margin-top: 4px;
        }

        /* ── REVIEW DETAIL MODAL ── */
        .review-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .review-modal.open {
            display: flex;
        }

        .review-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(16px);
        }

        .review-modal-panel {
            position: relative;
            z-index: 1;
            background: #111;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            width: 90%;
            max-width: 560px;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(0,0,0,0.8);
        }

        /* top banner = album art */
        .modal-art {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            filter: brightness(0.6);
        }

        .modal-body {
            padding: 24px 28px 28px;
            position: relative;
        }

        /* album art thumbnail overlapping banner */
        .modal-thumb {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
            position: absolute;
            top: -45px;
            left: 28px;
            border: 3px solid #111;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover { background: rgba(255,255,255,0.18); }

        .modal-titles {
            margin-top: 52px; /* space for thumb overlap */
        }

        .modal-album {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 4px 0;
        }

        .modal-artist-link {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            transition: color 0.2s;
            background: none;
            border: none;
            font-family: 'Poppins', sans-serif;
            padding: 0;
        }

        .modal-artist-link:hover {
            color: white;
            text-decoration: underline;
        }

        .modal-score-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0 14px;
        }

        .modal-score-big {
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
        }

        .modal-score-label {
            font-size: 12px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.06em;
        }

        .modal-star {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        .modal-divider {
            height: 1px;
            background: rgba(255,255,255,0.07);
            margin: 16px 0;
        }

        .modal-notes {
            font-size: 13px;
            line-height: 1.7;
            color: rgba(255,255,255,0.6);
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-tag {
            padding: 4px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
            color: rgba(255,255,255,0.45);
        }

        .modal-date {
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            margin-top: 18px;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.2);
            text-align: center;
            gap: 10px;
        }

        .empty-state.visible {
            display: flex;
        }

        .empty-state span {
            font-size: 36px;
        }

        .empty-state p {
            font-size: 14px;
            margin: 0;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 860px) {
            .reviews-page { padding: 90px 24px 60px; }
            .reviews-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        }

        @media (max-width: 500px) {
            .reviews-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="logo-big-tran.png" alt="Logo">
        </a>
    </div>

    <ul class="nav-center">
        <li><a href="home.html">HOME</a></li>
        <li><a href="releases.html">RELEASES</a></li>
        <li><a href="announcements.html">ANNOUNCEMENTS</a></li>
        <li><a href="watch.html">WATCH & RATINGS</a></li>
        <li><a href="reviews.html">REVIEWS</a></li>
    </ul>
</header>

<div class="reviews-page">

    <!-- Page header -->
    <div class="reviews-header">
        <div class="reviews-header-left">
            <h1>Album Reviews</h1>
            <p id="reviewCount">— reviews</p>
        </div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
            <button class="filter-chip" onclick="setFilter('recent', this)">Recent</button>
            <button class="filter-chip" onclick="setFilter('top', this)">Highest Rated</button>
            <button class="filter-chip" onclick="setFilter('lowest', this)">Lowest Rated</button>
        </div>
    </div>

    <!-- Artist view header (shown when filtering by artist) -->
    <div class="artist-header" id="artistHeader">
        <div class="artist-header-avatar" id="artistAvatar">?</div>
        <div class="artist-header-info">
            <h2 id="artistHeaderName"></h2>
            <p id="artistHeaderCount"></p>
        </div>
        <button class="artist-back" onclick="clearArtistFilter()">← All Reviews</button>
    </div>

    <div class="section-label" id="sectionLabel">Recent Uploads</div>

    <!-- Grid -->
    <div class="reviews-grid" id="reviewsGrid"></div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
        <span>🎵</span>
        <p>No reviews found.</p>
    </div>

</div>

<!-- Review detail modal -->
<div class="review-modal" id="reviewModal">
    <div class="review-modal-backdrop" onclick="closeReview()"></div>
    <div class="review-modal-panel">
        <img class="modal-art" id="modalArt" src="" alt="">
        <div class="modal-body">
            <img class="modal-thumb" id="modalThumb" src="" alt="">
            <button class="modal-close" onclick="closeReview()">×</button>
            <div class="modal-titles">
                <h2 class="modal-album" id="modalAlbum"></h2>
                <button class="modal-artist-link" id="modalArtist" onclick="filterByArtistFromModal()"></button>
            </div>
            <div class="modal-score-row">
                <img class="modal-star" id="modalStar" src="yellowstar.png" alt="">
                <span class="modal-score-big" id="modalScore"></span>
                <span class="modal-score-label">/ 10</span>
            </div>
            <div class="modal-divider"></div>
            <p class="modal-notes" id="modalNotes"></p>
            <div class="modal-tags" id="modalTags"></div>
            <p class="modal-date" id="modalDate"></p>
        </div>
    </div>
</div>

<script>

/* ═══════════════════════════════════════════
   REVIEW DATA — add your reviews here
   Fields:
     id         unique string
     album      album title
     artist     artist name
     cover      image filename (put in your repo)
     score      number out of 10
     date       "Month YYYY"
     notes      your short review text
     tags       array of genre/vibe tags
     scoreType  "yellow" | "red" | "green" | "blue"
               (controls star colour; yellow=default)
═══════════════════════════════════════════ */
const reviews = [
    {
        id: "drake-iceman",
        album: "ICEMAN",
        artist: "Drake",
        cover: "white.png",
        score: 7.2,
        date: "May 2026",
        notes: "A confident return. The production leans icy and minimal throughout, and Drake sounds more focused than he has in years. A few tracks overstay their welcome but the highs are genuinely great.",
        tags: ["Hip-Hop", "Rap", "2026"],
        scoreType: "yellow"
    },
    {
        id: "weeknd-hut",
        album: "Hurry Up Tomorrow",
        artist: "The Weeknd",
        cover: "white.png",
        score: 8.1,
        date: "Jan 2025",
        notes: "A fittingly dramatic closer to the XO trilogy. The theatrics are earned this time. Some of the best vocal performances of his career.",
        tags: ["R&B", "Pop", "2025"],
        scoreType: "yellow"
    }
];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let currentFilter   = "all";
let currentArtist   = null;
let activeModalId   = null;

/* ═══════════════════════════════════════════
   SCORE → STAR IMAGE
═══════════════════════════════════════════ */
function starImg(type) {
    const map = { yellow: "yellowstar.png", red: "redstar.png", green: "greenstar.png", blue: "bluestar.png" };
    return map[type] || "yellowstar.png";
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function getFiltered() {
    let list = [...reviews];

    if (currentArtist) {
        list = list.filter(r => r.artist === currentArtist);
    }

    if (currentFilter === "recent") {
        // already in insertion order; just keep as-is
    } else if (currentFilter === "top") {
        list.sort((a, b) => b.score - a.score);
    } else if (currentFilter === "lowest") {
        list.sort((a, b) => a.score - b.score);
    }

    return list;
}

function render() {
    const list  = getFiltered();
    const grid  = document.getElementById("reviewsGrid");
    const empty = document.getElementById("emptyState");

    grid.innerHTML = "";

    if (list.length === 0) {
        empty.classList.add("visible");
        return;
    }
    empty.classList.remove("visible");

    list.forEach(r => {
        const card = document.createElement("div");
        card.className = "review-card";
        card.innerHTML = `
            <div class="review-thumb">
                <img src="${r.cover}" alt="${r.album}">
                <div class="review-score">
                    <img src="${starImg(r.scoreType)}" alt="">
                    ${r.score.toFixed(1)}
                </div>
            </div>
            <div class="review-info">
                <div class="review-album">${r.album}</div>
                <span class="review-artist" onclick="filterByArtist('${r.artist}', event)">${r.artist}</span>
                <div class="review-meta">${r.date}</div>
            </div>
        `;
        card.querySelector(".review-thumb").addEventListener("click", () => openReview(r.id));
        card.querySelector(".review-album").addEventListener("click", () => openReview(r.id));
        grid.appendChild(card);
    });

    // Update count
    const total = reviews.length;
    document.getElementById("reviewCount").textContent =
        currentArtist
            ? `${list.length} review${list.length !== 1 ? "s" : ""} · ${currentArtist}`
            : `${total} review${total !== 1 ? "s" : ""}`;

    // Section label
    const labelMap = { all: "Recent Uploads", recent: "Recent Uploads", top: "Highest Rated", lowest: "Lowest Rated" };
    document.getElementById("sectionLabel").textContent =
        currentArtist ? `${currentArtist} — All Reviews` : labelMap[currentFilter];
}

/* ═══════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════ */
function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    render();
}

function filterByArtist(artist, e) {
    if (e) e.stopPropagation();
    currentArtist = artist;

    // Artist header
    const header = document.getElementById("artistHeader");
    document.getElementById("artistHeaderName").textContent = artist;
    const count = reviews.filter(r => r.artist === artist).length;
    document.getElementById("artistHeaderCount").textContent =
        `${count} review${count !== 1 ? "s" : ""}`;
    document.getElementById("artistAvatar").textContent = artist.charAt(0).toUpperCase();
    header.classList.add("visible");

    render();
}

function clearArtistFilter() {
    currentArtist = null;
    document.getElementById("artistHeader").classList.remove("visible");
    render();
}

/* ═══════════════════════════════════════════
   REVIEW MODAL
═══════════════════════════════════════════ */
function openReview(id) {
    const r = reviews.find(x => x.id === id);
    if (!r) return;
    activeModalId = id;

    document.getElementById("modalArt").src       = r.cover;
    document.getElementById("modalThumb").src     = r.cover;
    document.getElementById("modalAlbum").textContent  = r.album;
    document.getElementById("modalArtist").textContent = r.artist;
    document.getElementById("modalScore").textContent  = r.score.toFixed(1);
    document.getElementById("modalStar").src      = starImg(r.scoreType);
    document.getElementById("modalNotes").textContent  = r.notes;
    document.getElementById("modalDate").textContent   = `Reviewed ${r.date}`;

    const tagsEl = document.getElementById("modalTags");
    tagsEl.innerHTML = r.tags.map(t => `<span class="modal-tag">${t}</span>`).join("");

    document.getElementById("reviewModal").classList.add("open");
}

function closeReview() {
    document.getElementById("reviewModal").classList.remove("open");
    activeModalId = null;
}

function filterByArtistFromModal() {
    const r = reviews.find(x => x.id === activeModalId);
    if (!r) return;
    closeReview();
    filterByArtist(r.artist);
}

document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeReview();
});

/* ── INIT ── */
render();

</script>

</body>
</html>
