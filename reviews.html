<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reviews - Gurraj Grewal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* NAVBAR */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .nav-center {
            display: flex;
            gap: 10px;
            list-style: none;
            margin: 0;
            padding: 10px 20px;
        }

        .nav-center li a {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 999px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-center li a:hover { background: rgba(255,255,255,0.2); }

        .nav-center li a[href="reviews.html"] { background: rgba(255,255,255,0.3); }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #080808;
            color: white;
        }

        /* ── PAGE LAYOUT ── */
        .reviews-page {
            padding: 100px 60px 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── PAGE HEADER ── */
        .reviews-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .reviews-header-left h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 4px 0;
        }

        .reviews-header-left p {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            margin: 0;
        }

        /* ── FILTER BAR ── */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 7px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.55);
            font-size: 12px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .filter-chip:hover { background: rgba(255,255,255,0.1); color: white; }
        .filter-chip.active { background: white; color: black; border-color: white; }

        /* ── ARTIST HEADER ── */
        .artist-header {
            display: none;
            align-items: center;
            gap: 18px;
            margin-bottom: 32px;
            padding: 20px 24px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
        }

        .artist-header.visible { display: flex; }

        .artist-header-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            flex-shrink: 0;
            color: rgba(255,255,255,0.7);
        }

        .artist-header-info h2 { font-size: 20px; font-weight: 600; margin: 0 0 2px 0; }
        .artist-header-info p  { font-size: 12px; color: rgba(255,255,255,0.35); margin: 0; }

        .artist-back {
            margin-left: auto;
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 12px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .artist-back:hover { background: rgba(255,255,255,0.08); color: white; }

        /* ── SECTION LABEL ── */
        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        /* ── REVIEW GRID ── */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }

        /* ── REVIEW CARD ── */
        .review-card {
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .review-card:hover { transform: translateY(-3px); }
        .review-card:hover .review-thumb { box-shadow: 0 12px 30px rgba(0,0,0,0.6); }

        .review-thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            overflow: hidden;
            background: #1a1a1a;
            position: relative;
            margin-bottom: 12px;
            transition: box-shadow 0.2s ease;
        }

        .review-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ── SCORE BADGE (card) — colour-coded, no star ── */
        .review-score {
            position: absolute;
            bottom: 8px;
            right: 8px;
            border-radius: 8px;
            padding: 4px 9px;
            font-size: 13px;
            font-weight: 700;
            color: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.5);
        }

        .review-info { padding: 0 2px; }

        .review-album {
            font-size: 14px;
            font-weight: 600;
            color: white;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .review-artist {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            display: inline-block;
            transition: color 0.2s;
        }

        .review-artist:hover { color: rgba(255,255,255,0.9); text-decoration: underline; }

        .review-meta { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 4px; }

        /* ── REVIEW DETAIL MODAL ── */
        .review-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .review-modal.open { display: flex; }

        .review-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(16px);
        }

        .review-modal-panel {
            position: relative;
            z-index: 1;
            background: #111;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            width: 90%;
            max-width: 580px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 32px 80px rgba(0,0,0,0.8);
        }

        .review-modal-panel::-webkit-scrollbar { width: 4px; }
        .review-modal-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

        .modal-art {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            filter: brightness(0.55);
        }

        .modal-body {
            padding: 24px 28px 32px;
            position: relative;
        }

        .modal-thumb {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
            position: absolute;
            top: -45px;
            left: 28px;
            border: 3px solid #111;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover { background: rgba(255,255,255,0.18); }

        .modal-titles { margin-top: 52px; }

        .modal-album { font-size: 20px; font-weight: 600; margin: 0 0 4px 0; }

        .modal-artist-link {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            transition: color 0.2s;
            background: none;
            border: none;
            font-family: 'Poppins', sans-serif;
            padding: 0;
        }

        .modal-artist-link:hover { color: white; text-decoration: underline; }

        /* ── SCORE ROW (modal) — big coloured number, no star ── */
        .modal-score-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 20px 0 16px;
        }

        .modal-score-badge {
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
            padding: 8px 18px;
            border-radius: 10px;
            color: white;
        }

        .modal-score-label {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.06em;
            line-height: 1.4;
        }

        .modal-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 16px 0; }

        .modal-notes { font-size: 13px; line-height: 1.7; color: rgba(255,255,255,0.6); }

        /* ── TRACK LIST ── */
        .modal-tracks-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            margin: 20px 0 12px;
        }

        .tracks-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .track-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .track-num {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            width: 18px;
            text-align: right;
            flex-shrink: 0;
        }

        .track-name {
            flex: 1;
            font-size: 13px;
            color: rgba(255,255,255,0.75);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-tile {
            width: 46px;
            height: 32px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 3px 8px rgba(0,0,0,0.35);
        }

        /* unrated track */
        .track-tile.unrated {
            background: #222 !important;
            color: rgba(255,255,255,0.3);
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 18px;
        }

        .modal-tag {
            padding: 4px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
            color: rgba(255,255,255,0.45);
        }

        .modal-date { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 16px; }

        /* ── EMPTY STATE ── */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.2);
            text-align: center;
            gap: 10px;
        }

        .empty-state.visible { display: flex; }
        .empty-state span { font-size: 36px; }
        .empty-state p { font-size: 14px; margin: 0; }

        /* ── RESPONSIVE ── */
        @media (max-width: 860px) {
            .reviews-page { padding: 90px 24px 60px; }
            .reviews-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        }

        @media (max-width: 500px) {
            .reviews-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="logo-big-tran.png" alt="Logo">
        </a>
    </div>

    <ul class="nav-center">
        <li><a href="home.html">HOME</a></li>
        <li><a href="releases.html">RELEASES</a></li>
        <li><a href="announcements.html">ANNOUNCEMENTS</a></li>
        <li><a href="watch.html">WATCH & RATINGS</a></li>
        <li><a href="reviews.html">REVIEWS</a></li>
    </ul>
</header>

<div class="reviews-page">

    <div class="reviews-header">
        <div class="reviews-header-left">
            <h1>Album Reviews</h1>
            <p id="reviewCount">— reviews</p>
        </div>

        <div class="filter-bar">
            <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
            <button class="filter-chip" onclick="setFilter('recent', this)">Recent</button>
            <button class="filter-chip" onclick="setFilter('top', this)">Highest Rated</button>
            <button class="filter-chip" onclick="setFilter('lowest', this)">Lowest Rated</button>
        </div>
    </div>

    <div class="artist-header" id="artistHeader">
        <div class="artist-header-avatar" id="artistAvatar">?</div>
        <div class="artist-header-info">
            <h2 id="artistHeaderName"></h2>
            <p id="artistHeaderCount"></p>
        </div>
        <button class="artist-back" onclick="clearArtistFilter()">← All Reviews</button>
    </div>

    <div class="section-label" id="sectionLabel">Recent Uploads</div>
    <div class="reviews-grid" id="reviewsGrid"></div>

    <div class="empty-state" id="emptyState">
        <span>🎵</span>
        <p>No reviews found.</p>
    </div>

</div>

<!-- Review detail modal -->
<div class="review-modal" id="reviewModal">
    <div class="review-modal-backdrop" onclick="closeReview()"></div>
    <div class="review-modal-panel">
        <img class="modal-art" id="modalArt" src="" alt="">
        <div class="modal-body">
            <img class="modal-thumb" id="modalThumb" src="" alt="">
            <button class="modal-close" onclick="closeReview()">×</button>
            <div class="modal-titles">
                <h2 class="modal-album" id="modalAlbum"></h2>
                <button class="modal-artist-link" id="modalArtist" onclick="filterByArtistFromModal()"></button>
            </div>
            <div class="modal-score-row">
                <div class="modal-score-badge" id="modalScoreBadge"></div>
                <div class="modal-score-label">out of 10</div>
            </div>
            <div class="modal-divider"></div>
            <p class="modal-notes" id="modalNotes"></p>
            <div id="modalTracksSection"></div>
            <div class="modal-tags" id="modalTags"></div>
            <p class="modal-date" id="modalDate"></p>
        </div>
    </div>
</div>

<script>

/* ═══════════════════════════════════════════════════════
   COLOUR SYSTEM — matches your watch.html tiles exactly
═══════════════════════════════════════════════════════ */
function scoreColor(score) {
    if (score === null || score === undefined) return null;
    if (score < 3)   return "#351e4f";
    if (score < 5)   return "#8e0808";
    if (score < 7)   return "#cea502";
    if (score < 8)   return "#1abf2d";
    if (score < 9.5) return "#008236";
    return "#02d2f7";
}

/* ═══════════════════════════════════════════════════════
   REVIEW DATA
   Fields:
     id       — unique string
     album    — album title
     artist   — artist name
     cover    — image URL or filename
     score    — overall score (number, 1–10)
     date     — "Month YYYY"
     notes    — your review text
     tags     — array of genre/vibe strings
     tracks   — array of { title, score } objects
               set score to null for unrated tracks
═══════════════════════════════════════════════════════ */
const reviews = [
    {
        id: "drake-iceman",
        album: "ICEMAN",
        artist: "Drake",
        cover: "white.png",
        score: 7.2,
        date: "May 2026",
        notes: "A confident return. The production leans icy and minimal throughout, and Drake sounds more focused than he has in years. A few tracks overstay their welcome but the highs are genuinely great.",
        tags: ["Hip-Hop", "Rap", "2026"],
        tracks: [
            { title: "ICEMAN",         score: 8.1 },
            { title: "Nokia",          score: 7.4 },
            { title: "Red Button",     score: 6.8 },
            { title: "Tightrope",      score: 7.9 },
            { title: "Murda",          score: 5.5 },
            { title: "Duppy",          score: 8.3 },
            { title: "Still Here",     score: 6.2 },
            { title: "Outro",          score: null }
        ]
    },
    {
        id: "weeknd-hut",
        album: "Hurry Up Tomorrow",
        artist: "The Weeknd",
        cover: "white.png",
        score: 8.1,
        date: "Jan 2025",
        notes: "A fittingly dramatic closer to the XO trilogy. The theatrics are earned this time. Some of the best vocal performances of his career.",
        tags: ["R&B", "Pop", "2025"],
        tracks: [
            { title: "São Paulo",               score: 9.1 },
            { title: "Baptized in Fear",         score: 8.4 },
            { title: "Open Hearts",              score: 7.6 },
            { title: "Without a Warning",        score: 8.8 },
            { title: "Reflections Laughing",     score: 7.2 },
            { title: "Hurry Up Tomorrow",        score: 9.3 }
        ]
    }
];

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let currentFilter = "all";
let currentArtist = null;
let activeModalId = null;

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function getFiltered() {
    let list = [...reviews];
    if (currentArtist) list = list.filter(r => r.artist === currentArtist);
    if (currentFilter === "top")    list.sort((a, b) => b.score - a.score);
    if (currentFilter === "lowest") list.sort((a, b) => a.score - b.score);
    return list;
}

function render() {
    const list  = getFiltered();
    const grid  = document.getElementById("reviewsGrid");
    const empty = document.getElementById("emptyState");

    grid.innerHTML = "";

    if (list.length === 0) { empty.classList.add("visible"); return; }
    empty.classList.remove("visible");

    list.forEach(r => {
        const card = document.createElement("div");
        card.className = "review-card";
        const bg = scoreColor(r.score);
        card.innerHTML = `
            <div class="review-thumb">
                <img src="${r.cover}" alt="${r.album}">
                <div class="review-score" style="background:${bg}">
                    ${r.score.toFixed(1)}
                </div>
            </div>
            <div class="review-info">
                <div class="review-album">${r.album}</div>
                <span class="review-artist" onclick="filterByArtist('${r.artist.replace(/'/g,"\\'")}', event)">${r.artist}</span>
                <div class="review-meta">${r.date}</div>
            </div>
        `;
        card.querySelector(".review-thumb").addEventListener("click", () => openReview(r.id));
        card.querySelector(".review-album").addEventListener("click",  () => openReview(r.id));
        grid.appendChild(card);
    });

    const total = reviews.length;
    document.getElementById("reviewCount").textContent = currentArtist
        ? `${list.length} review${list.length !== 1 ? "s" : ""} · ${currentArtist}`
        : `${total} review${total !== 1 ? "s" : ""}`;

    const labelMap = { all: "Recent Uploads", recent: "Recent Uploads", top: "Highest Rated", lowest: "Lowest Rated" };
    document.getElementById("sectionLabel").textContent = currentArtist
        ? `${currentArtist} — All Reviews`
        : labelMap[currentFilter];
}

/* ═══════════════════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════════════════ */
function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    render();
}

function filterByArtist(artist, e) {
    if (e) e.stopPropagation();
    currentArtist = artist;
    document.getElementById("artistHeaderName").textContent  = artist;
    const count = reviews.filter(r => r.artist === artist).length;
    document.getElementById("artistHeaderCount").textContent = `${count} review${count !== 1 ? "s" : ""}`;
    document.getElementById("artistAvatar").textContent      = artist.charAt(0).toUpperCase();
    document.getElementById("artistHeader").classList.add("visible");
    render();
}

function clearArtistFilter() {
    currentArtist = null;
    document.getElementById("artistHeader").classList.remove("visible");
    render();
}

/* ═══════════════════════════════════════════════════════
   REVIEW MODAL
═══════════════════════════════════════════════════════ */
function openReview(id) {
    const r = reviews.find(x => x.id === id);
    if (!r) return;
    activeModalId = id;

    document.getElementById("modalArt").src                    = r.cover;
    document.getElementById("modalThumb").src                  = r.cover;
    document.getElementById("modalAlbum").textContent          = r.album;
    document.getElementById("modalArtist").textContent         = r.artist;
    document.getElementById("modalNotes").textContent          = r.notes;
    document.getElementById("modalDate").textContent           = `Reviewed ${r.date}`;

    // Score badge — coloured background, just the number
    const badge = document.getElementById("modalScoreBadge");
    badge.textContent        = r.score.toFixed(1);
    badge.style.background   = scoreColor(r.score);

    // Tags
    document.getElementById("modalTags").innerHTML =
        r.tags.map(t => `<span class="modal-tag">${t}</span>`).join("");

    // Track list
    const tracksSection = document.getElementById("modalTracksSection");
    if (r.tracks && r.tracks.length > 0) {
        tracksSection.innerHTML = `
            <div class="modal-divider"></div>
            <div class="modal-tracks-title">Tracks</div>
            <div class="tracks-grid" id="tracksGrid"></div>
        `;
        const grid = tracksSection.querySelector("#tracksGrid");
        r.tracks.forEach((t, i) => {
            const row = document.createElement("div");
            row.className = "track-row";
            const isUnrated = t.score === null || t.score === undefined;
            const tileClass = isUnrated ? "track-tile unrated" : "track-tile";
            const tileText  = isUnrated ? "—" : t.score.toFixed(1);
            const tileBg    = isUnrated ? "" : `style="background:${scoreColor(t.score)}"`;
            row.innerHTML = `
                <span class="track-num">${i + 1}</span>
                <span class="track-name">${t.title}</span>
                <div class="${tileClass}" ${tileBg}>${tileText}</div>
            `;
            grid.appendChild(row);
        });
    } else {
        tracksSection.innerHTML = "";
    }

    document.getElementById("reviewModal").classList.add("open");
    document.getElementById("reviewModal").scrollTop = 0;
}

function closeReview() {
    document.getElementById("reviewModal").classList.remove("open");
    activeModalId = null;
}

function filterByArtistFromModal() {
    const r = reviews.find(x => x.id === activeModalId);
    if (!r) return;
    closeReview();
    filterByArtist(r.artist);
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeReview(); });

/* ── INIT ── */
render();

</script>

</body>
</html>
