<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - Gurraj Grewal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* NAVBAR */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;

            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .nav-center {
            display: flex;
            gap: 10px;
            list-style: none;
            margin: 0;
            padding: 10px 20px;
        }

        .nav-center li a {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 999px;

            color: white;
            text-decoration: none;
            font-weight: 500;

            transition: all 0.2s ease;
        }

        .nav-center li a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-center li a[href="home.html"] {
            background: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: black;
            color: white;
        }

        /* HERO (UNCHANGED) */
        .hero-banner {
            position: relative;
            height: 65vh;
            overflow: hidden;
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7);
        }

        /* MAIN SECTION */
        .main {
            background: linear-gradient(to bottom, #111, #000);
            padding: 40px 60px;
        }

        .play-btn {
            width: 55px;
            height: 55px;
            background: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            cursor: pointer;
            font-size: 20px;
        }

        /* ROW */
        .row {
            margin-bottom: 60px;
        }

        /* FIX: ALIGN HEADINGS WITH CARDS */
        .row h2 {
            margin: 0 0 10px 24px; /* matches scroll padding-left */
            font-size: 22px;
        }

        /* SCROLL */
        .scroll {
            display: flex;
            gap: 18px;
            overflow-x: auto;

            padding: 20px 24px;
        }

        .scroll::-webkit-scrollbar {
            height: 6px;
        }

        .scroll::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        /* CARD */
        .card {
            min-width: 320px;
            height: 180px;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            flex-shrink: 0;

            transform-origin: center;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card:hover {
            transform: scale(1.04);
            z-index: 10;
            box-shadow: 0 14px 35px rgba(0,0,0,0.55);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.75);
        }

        .card p {
            position: absolute;
            bottom: 10px;
            left: 12px;
            right: 12px;

            margin: 0;
            font-size: 14px;
            font-weight: 500;

            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent 60%);
        }

    </style>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="logo-big-tran.png" alt="Logo">
        </a>
    </div>

    <ul class="nav-center">
        <li><a href="home.html">HOME</a></li>
        <li><a href="releases.html">RELEASES</a></li>
        <li><a href="announcements.html">ANNOUNCEMENTS</a></li>
        <li><a href="watch.html">WATCH & RATINGS</a></li>
    </ul>
</header>

<!-- HERO -->
<section class="hero-banner">
    <img src="GurrajGrewal.png">

    <div style="position: absolute; bottom: 50px; left: 60px;">
        <h1 style="font-size: 64px; margin: 0;">Gurraj Grewal</h1>
        <p style="opacity: 0.8;">635,670 lifetime viewership</p>
    </div>
</section>

<!-- MAIN -->
<section class="main">

    <div class="play-btn">▶</div>

    <!-- RELEASES -->
    <div class="row">
        <h2>Releases</h2>

        <div class="scroll">

<div class="card" onclick="goToSlide(2)">
    <img src="HCMAArt.png">
    <p>Hypixel Cinematic Montages (Anniversary)</p>
</div>

<div class="card" onclick="goToSlide(1)">
    <img src="PRE-PARTYART.png">
    <p>Pre-Party</p>
</div>

<div class="card" onclick="goToSlide(0)">
    <img src="HCMArt.png">
    <p>Hypixel Cinematic Montages (Original)</p>
</div>

        </div>
    </div>

    <!-- UPCOMING -->
    <div class="row">
        <h2>Upcoming</h2>

        <div class="scroll">

            <div class="card">
                <img src="DaytonaArt2.png">
                <p>Daytona</p>
            </div>

        </div>
    </div>

    <script>
function goToSlide(index) {
    window.location.href = `releases.html?slide=${index}`;
}
</script>

</section>

</body>
</html>
