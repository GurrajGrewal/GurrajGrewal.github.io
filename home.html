<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - Gurraj Grewal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* NAVBAR (UNCHANGED) */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;

            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .nav-center {
            display: flex;
            gap: 10px;
            list-style: none;
            margin: 0;
            padding: 10px 20px;
        }

        .nav-center li a {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 999px;

            color: white;
            text-decoration: none;
            font-weight: 500;

            transition: all 0.2s ease;
        }

        .nav-center li a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-center li a[href="home.html"] {
            background: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: black;
            color: white;
        }

        /* HERO */
        .hero-banner {
            position: relative;
            height: 65vh;
            overflow: hidden;
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7);
        }

        /* MAIN SECTION */
        .main {
            background: linear-gradient(to bottom, #111, #000);
            padding: 40px 60px;
        }

        /* PLAY BUTTON */
        .play-btn {
            width: 55px;
            height: 55px;
            background: #1db954;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            cursor: pointer;
            font-size: 20px;
        }

        /* ROW */
        .row {
            margin-bottom: 50px;
        }

        .row h2 {
            margin-bottom: 20px;
            font-size: 22px;
        }

        /* SCROLL ROW */
        .scroll {
            display: flex;
            gap: 20px;
            overflow-x: auto;
        }

        .scroll::-webkit-scrollbar {
            height: 6px;
        }

        .scroll::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        /* CARDS */
        .card {
            min-width: 180px;
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.08);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        .card p {
            margin-top: 8px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="logo-big-tran.png" alt="Logo">
        </a>
    </div>

    <ul class="nav-center">
        <li><a href="home.html">HOME</a></li>
        <li><a href="releases.html">RELEASES</a></li>
        <li><a href="announcements.html">ANNOUNCEMENTS</a></li>
        <li><a href="watch.html">WATCH & RATINGS</a></li>
    </ul>
</header>

<!-- HERO -->
<section class="hero-banner">
    <img src="GurrajGrewal.png">

    <div style="position: absolute; bottom: 50px; left: 60px;">
        <h1 style="font-size: 64px; margin: 0;">Gurraj Grewal</h1>
        <p style="opacity: 0.8;">451,101 Impressions</p>
    </div>
</section>

<!-- MAIN -->
<section class="main">

    <div class="play-btn">▶</div>

    <!-- RELEASES -->
    <div class="row">
        <h2>Releases</h2>

        <div class="scroll">

            <div class="card">
                <img src="HCMA.png">
                <p>Hypixel Cinematic Montages (Anniversary)</p>
            </div>

            <div class="card">
                <img src="PRE-PARTY.png">
                <p>Pre-Party</p>
            </div>

            <div class="card">
                <img src="HCM.png">
                <p>Hypixel Cinematic Montages (Original)</p>
            </div>

        </div>
    </div>

    <!-- UPCOMING -->
    <div class="row">
        <h2>Upcoming</h2>

        <div class="scroll">

            <div class="card">
                <img src="DaytonaCover.png">
                <p>Daytona</p>
            </div>

            <div class="card">
                <img src="white.png">
                <p>Coming Soon</p>
            </div>

        </div>
    </div>

</section>

</body>
</html>
