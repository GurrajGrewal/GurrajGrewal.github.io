<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home - Gurraj Grewal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
}

/* NAVBAR (your original style) */
.navbar {
    position: absolute;
    top: 0;
    width: 100%;
    z-index: 10;

    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);
}

.nav-center {
    display: flex;
    gap: 10px;
    list-style: none;
    margin: 0;
    padding: 10px 20px;
}

.nav-center li a {
    display: inline-block;
    padding: 10px 16px;
    border-radius: 999px;

    color: white;
    text-decoration: none;
    font-weight: 500;

    transition: all 0.2s ease;
}

.nav-center li a:hover {
    background: rgba(255,255,255,0.2);
}

/* HERO */
.hero {
    position: relative;
    height: 60vh;
    display: flex;
    align-items: flex-end;
    padding: 60px;
    overflow: hidden;
}

.hero img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.7);
}

.hero-text {
    position: relative;
    z-index: 2;
}

.hero-text h1 {
    font-size: 64px;
    margin: 0;
}

/* MAIN */
.main {
    padding: 40px 60px;
}

/* ROW */
.row {
    margin-bottom: 50px;
}

.row h2 {
    margin-bottom: 20px;
}

/* SCROLL ROW */
.scroll {
    display: flex;
    gap: 20px;
}

/* CARD FIX (no more cutoff) */
.card {
    width: 320px;
    cursor: pointer;
}

.card img {
    width: 100%;
    border-radius: 12px;
    transition: transform 0.3s ease;
}

/* KEY FIX: scale WITHOUT clipping */
.card:hover img {
    transform: scale(1.05);
}

/* TITLE TEXT */
.card p {
    margin-top: 10px;
    font-size: 14px;
    color: #ccc;
}
</style>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="logo-big-tran.png" alt="Logo" style="height:40px;">
        </a>
    </div>

    <ul class="nav-center">
        <li><a href="home.html">HOME</a></li>
        <li><a href="releases.html">RELEASES</a></li>
        <li><a href="announcements.html">ANNOUNCEMENTS</a></li>
        <li><a href="watch.html">WATCH & RATINGS</a></li>
    </ul>
</header>

<!-- HERO -->
<section class="hero">
    <img src="GurrajGrewal.png">

    <div class="hero-text">
        <h1>Gurraj Grewal</h1>
        <p>451,101 Impressions</p>
    </div>
</section>

<!-- MAIN -->
<section class="main">

    <!-- RELEASES -->
    <div class="row">
        <h2>Releases</h2>

        <div class="scroll">
            <div class="card">
                <img src="HCMA.png">
                <p>Hypixel Cinematic Montages (Anniversary)</p>
            </div>

            <div class="card">
                <img src="PRE-PARTY.png">
                <p>Pre-Party</p>
            </div>

            <div class="card">
                <img src="HCM.png">
                <p>Hypixel Cinematic Montages (Original)</p>
            </div>
        </div>
    </div>

    <!-- UPCOMING -->
    <div class="row">
        <h2>Upcoming</h2>

        <div class="scroll">
            <div class="card">
                <img src="DaytonaCover.png">
                <p>Daytona</p>
            </div>

            <div class="card">
                <img src="white.png">
                <p>Coming Soon</p>
            </div>
        </div>
    </div>

</section>

</body>
</html>
