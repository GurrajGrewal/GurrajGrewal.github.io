<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home - Gurraj Grewal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
}

/* ================= NAVBAR ================= */
.navbar {
    position: absolute;
    top: 0;
    width: 100%;
    z-index: 10;

    display: flex;
    align-items: center;
    justify-content: center; /* center everything */

    padding: 10px 0;

    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
}

/* INNER CONTAINER (prevents overflow) */
.nav-inner {
    width: 100%;
    max-width: 1200px; /* keeps things aligned */
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
}

/* LOGO (FIXED SIZE) */
.logo img {
    height: 40px; /* restore proper size */
    width: auto;
}

/* NAV LINKS */
.nav-center {
    display: flex;
    gap: 10px;
    list-style: none;
    margin: 0;
    padding: 0;
}

.nav-center li a {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 999px;

    color: #ddd;
    text-decoration: none;
    font-weight: 500;
    font-size: 13px;

    transition: all 0.2s ease;
}

.nav-center li a:hover {
    background: rgba(255, 255, 255, 0.2);
    color: white;
}

/* ACTIVE */
.nav-center li a[href="home.html"] {
    background: rgba(255, 255, 255, 0.3);
    color: white;
}

/* ================= HERO ================= */
.hero {
    position: relative;
    height: 60vh;
    display: flex;
    align-items: flex-end;
    padding: 60px;
    overflow: hidden;
}

.hero img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.6);
    top: 0;
    left: 0;
}

.hero-content {
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-size: 64px;
    margin: 0;
}

.hero p {
    opacity: 0.8;
}

/* ================= MAIN ================= */
.main {
    background: linear-gradient(to bottom, rgba(20,20,20,1), black);
    padding: 40px 60px;
}

.row {
    margin-bottom: 50px;
}

.row h2 {
    margin-bottom: 20px;
}

.scroll {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.scroll::-webkit-scrollbar {
    height: 6px;
}

.scroll::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 10px;
}

/* CARDS */
.card {
    min-width: 200px;
    cursor: pointer;
}

.card img {
    width: 100%;
    border-radius: 10px;
    transition: transform 0.25s ease;
}

.card:hover img {
    transform: scale(1.08);
}

.card p {
    margin: 8px 0 0 0;
    font-size: 14px;
}

/* PLAY BUTTON */
.play-btn {
    width: 50px;
    height: 50px;
    background: #1db954;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<header class="navbar">
    <div class="nav-inner">

        <div class="logo">
            <a href="home.html">
                <img src="logo-big-tran.png">
            </a>
        </div>

        <ul class="nav-center">
            <li><a href="home.html">HOME</a></li>
            <li><a href="releases.html">RELEASES</a></li>
            <li><a href="announcements.html">ANNOUNCEMENTS</a></li>
            <li><a href="watch.html">WATCH & RATINGS</a></li>
        </ul>

    </div>
</header>

<!-- HERO -->
<section class="hero">
    <img src="GurrajGrewal.png">

    <div class="hero-content">
        <h1>Gurraj Grewal</h1>
        <p>451,101 Impressions</p>
    </div>
</section>

<!-- MAIN -->
<section class="main">

    <div class="play-btn">▶</div>

    <!-- RELEASES -->
    <div class="row">
        <h2>Releases</h2>

        <div class="scroll">

            <div class="card">
                <img src="HCMA.png">
                <p>Hypixel Cinematic Montages (Anniversary)</p>
            </div>

            <div class="card">
                <img src="PRE-PARTY.png">
                <p>Pre-Party</p>
            </div>

            <div class="card">
                <img src="HCM.png">
                <p>Hypixel Cinematic Montages (Original)</p>
            </div>

        </div>
    </div>

    <!-- UPCOMING -->
    <div class="row">
        <h2>Upcoming</h2>

        <div class="scroll">

            <div class="card">
                <img src="DaytonaCover.png">
                <p>Daytona</p>
            </div>

            <div class="card">
                <img src="white.png">
                <p>Coming Soon</p>
            </div>

        </div>
    </div>

</section>

</body>
</html>
