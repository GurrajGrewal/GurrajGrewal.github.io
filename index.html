<!DOCTYPE html>
<html>
<head>
    <title>Gurraj Grewal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            cursor: none;
        }

        /* ── CUSTOM CURSOR ── */
        .cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.08s ease, opacity 0.2s ease;
        }

        .cursor-ring {
            position: fixed;
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: all 0.18s ease;
        }

        body:hover .cursor { opacity: 1; }

        /* ── CANVAS BACKGROUND ── */
        canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── SCANLINES ── */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
        }

        /* ── VIGNETTE ── */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 2;
            background: radial-gradient(
                ellipse at center,
                transparent 40%,
                rgba(0,0,0,0.75) 100%
            );
            pointer-events: none;
        }

        /* ── MAIN CONTAINER ── */
        .enter-container {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        /* ── LOGO ── */
        .logo-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeUp 1.4s ease 0.6s forwards;
        }

        .enter-logo-img {
            width: 340px;
            max-width: 80vw;
            position: relative;
            z-index: 2;
            filter: brightness(1);
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        .logo-wrap:hover .enter-logo-img {
            filter: brightness(1.15);
            transform: scale(1.03);
        }

        /* Glow behind logo */
        .logo-glow {
            position: absolute;
            width: 500px;
            height: 200px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 70%);
            pointer-events: none;
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.08); }
        }

        /* ── ENTER PROMPT ── */
        .enter-prompt {
            margin-top: 48px;
            opacity: 0;
            animation: fadeUp 1s ease 1.8s forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .enter-link {
            text-decoration: none;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            transition: color 0.3s ease, letter-spacing 0.4s ease;
            position: relative;
        }

        .enter-link::after {
            content: "";
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background: rgba(255,255,255,0.4);
            transition: width 0.4s ease;
        }

        .enter-link:hover {
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.5em;
        }

        .enter-link:hover::after {
            width: 100%;
        }

        /* Animated dots */
        .dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            animation: dotPulse 1.6s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.4); }
        }

        /* ── DATE STAMP ── */
        .datestamp {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 10px;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.18);
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 1s ease 2.4s forwards;
            white-space: nowrap;
        }

        /* ── CORNER MARKS ── */
        .corner {
            position: fixed;
            z-index: 10;
            width: 18px;
            height: 18px;
            opacity: 0;
            animation: fadeIn 1s ease 1s forwards;
        }

        .corner::before,
        .corner::after {
            content: "";
            position: absolute;
            background: rgba(255,255,255,0.25);
        }

        .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
        .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }

        .corner.tl { top: 28px; left: 28px; }
        .corner.tr { top: 28px; right: 28px; transform: scaleX(-1); }
        .corner.bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
        .corner.br { bottom: 28px; right: 28px; transform: scale(-1); }

        /* ── GLITCH FLASH ── */
        .glitch-overlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            mix-blend-mode: difference;
            background: white;
        }

        /* ── PAGE TRANSITION ── */
        .transition-wipe {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #000;
            transform: scaleY(0);
            transform-origin: bottom;
        }

        .transition-wipe.active {
            animation: wipeIn 0.55s cubic-bezier(0.76, 0, 0.24, 1) forwards;
        }

        @keyframes wipeIn {
            from { transform: scaleY(0); transform-origin: bottom; }
            to   { transform: scaleY(1); transform-origin: bottom; }
        }

        /* ── KEYFRAMES ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
    </style>
</head>
<body>

<!-- Custom cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- Particle canvas -->
<canvas id="canvas"></canvas>

<!-- Overlays -->
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="glitch-overlay" id="glitch"></div>
<div class="transition-wipe" id="wipe"></div>

<!-- Corner marks -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Main content -->
<div class="enter-container">

    <a href="home.html" class="logo-wrap" id="enterLink" onclick="handleEnter(event)">
        <div class="logo-glow"></div>
        <img src="logo-big.png" alt="Logo" class="enter-logo-img">
    </a>

    <div class="enter-prompt">
        <a href="home.html" class="enter-link" id="enterText" onclick="handleEnter(event)">Enter</a>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

</div>

<div class="datestamp" id="datestamp"></div>

<script>
/* ── CURSOR ── */
const cursor     = document.getElementById("cursor");
const cursorRing = document.getElementById("cursorRing");

let mx = window.innerWidth / 2;
let my = window.innerHeight / 2;
let rx = mx, ry = my;

document.addEventListener("mousemove", e => {
    mx = e.clientX;
    my = e.clientY;
    cursor.style.left = mx + "px";
    cursor.style.top  = my + "px";
});

(function animRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) *.12;
    cursorRing.style.left = rx + "px";
    cursorRing.style.top  = ry + "px";
    requestAnimationFrame(animRing);
})();

/* ── DATESTAMP ── */
const now = new Date();
document.getElementById("datestamp").textContent =
    now.toLocaleDateString("en-GB", { day:"2-digit", month:"long", year:"numeric" }).toUpperCase();

/* ── PARTICLE CANVAS ── */
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");

function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const PARTICLE_COUNT = 90;
const particles = [];

for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
        x:    Math.random() * window.innerWidth,
        y:    Math.random() * window.innerHeight,
        r:    Math.random() * 1.2 + 0.2,
        vx:   (Math.random() - 0.5) * 0.25,
        vy:   (Math.random() - 0.5) * 0.25,
        alpha: Math.random() * 0.4 + 0.05
    });
}

// Connection lines between close particles
function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 120) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255,255,255,${0.06 * (1 - dist / 120)})`;
                ctx.lineWidth = 0.5;
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
}

function animParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawConnections();

    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
        ctx.fill();
    });

    requestAnimationFrame(animParticles);
}
animParticles();

/* ── RANDOM GLITCH FLASHES ── */
const glitch = document.getElementById("glitch");

function triggerGlitch() {
    const duration = Math.random() * 60 + 30;
    glitch.style.transition = "none";
    glitch.style.opacity = (Math.random() * 0.04 + 0.01).toString();

    // Horizontal shift on logo
    const logo = document.querySelector(".enter-logo-img");
    const shift = (Math.random() - 0.5) * 6;
    logo.style.transform = `translateX(${shift}px)`;

    setTimeout(() => {
        glitch.style.opacity = "0";
        logo.style.transform = "";

        // Sometimes do a double flash
        if (Math.random() > 0.5) {
            setTimeout(() => {
                glitch.style.opacity = (Math.random() * 0.03).toString();
                logo.style.transform = `translateX(${(Math.random()-0.5)*4}px)`;
                setTimeout(() => {
                    glitch.style.opacity = "0";
                    logo.style.transform = "";
                }, 40);
            }, 80);
        }
    }, duration);

    // Schedule next glitch
    setTimeout(triggerGlitch, Math.random() * 5000 + 2000);
}

setTimeout(triggerGlitch, 2800);

/* ── PAGE TRANSITION ON ENTER ── */
function handleEnter(e) {
    e.preventDefault();
    const target = e.currentTarget.href || "home.html";
    const wipe = document.getElementById("wipe");
    wipe.classList.add("active");
    setTimeout(() => { window.location.href = target; }, 560);
}

// Also attach to enter text link
document.getElementById("enterText").addEventListener("click", handleEnter);
</script>

</body>
</html>
