<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch & Ratings - Gurraj Grewal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="favicon.png">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
}

/* NAVBAR */
.navbar {
    position: absolute;
    top: 0;
    width: 100%;
    z-index: 10;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
}

.nav-center {
    display: flex;
    gap: 10px;
    list-style: none;
    margin: 0;
    padding: 10px 20px;
}

.nav-center li a {
    display: inline-block;
    padding: 10px 16px;
    border-radius: 999px;
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: 0.2s;
}

.nav-center li a:hover {
    background: rgba(255,255,255,0.2);
}

.nav-center li a[href="watch.html"] {
    background: rgba(255,255,255,0.3);
}

/* PAGE */
.ratings-section {
    padding: 120px 80px 80px;
}

/* PROJECT BLOCK */
.project-block {
    margin-bottom: 90px;
    border-radius: 22px;
    overflow: hidden;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
}

/* HEADER IMAGE */
.project-header {
    position: relative;
    height: 320px;
    overflow: hidden;
}

.project-header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.55) contrast(1.15);
    transform: scale(1.03);
}

.project-info {
    position: absolute;
    bottom: 25px;
    left: 35px;
}

.project-info h2 {
    margin: 0;
    font-weight: 500;
    opacity: 0.9;
}

.project-info h1 {
    margin: 6px 0 0;
    font-size: 48px;
}

/* AVG RATING */
.overall-rating {
    padding: 35px 35px 10px;
}

.overall-rating h3 {
    font-size: 18px;
    opacity: 0.8;
    margin-bottom: 10px;
}

.rating-box {
    display: flex;
    align-items: baseline;
    gap: 12px;
    font-size: 42px;
    font-weight: 600;
}

.rating-box img {
    width: 28px;
    height: 28px;
}

/* EPISODE SECTION */
.episode-ratings {
    padding: 10px 35px 35px;
}

.episode-ratings h3 {
    font-size: 18px;
    opacity: 0.85;
    margin-bottom: 18px;
}

/* TABLE */
.ratings-table {
    margin-top: 10px;
}

.ratings-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 14px;
}

.ratings-header-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
    margin-left: 70px; /* 58px season-label + 12px gap */
}

.ratings-header-row div {
    width: 58px;
    text-align: center;
    font-size: 13px;
    opacity: 0.6;
}

/* SEASON LABEL */
.season-label {
    width: 58px;
    opacity: 0.6;
    text-align: center;
    flex-shrink: 0;
}

/* RATING TILES */
.rating-tile {
    width: 58px;
    height: 58px;
    border-radius: 12px;
    flex-shrink: 0;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 14px;
    font-weight: 700;
    color: white;

    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    transition: transform 0.15s ease, filter 0.15s ease;
}

.rating-tile:hover {
    transform: scale(1.07);
    filter: brightness(1.1);
}

</style>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="logo-big-tran.png" alt="Logo">
        </a>
    </div>

    <ul class="nav-center">
        <li><a href="home.html">HOME</a></li>
        <li><a href="releases.html">RELEASES</a></li>
        <li><a href="announcements.html">ANNOUNCEMENTS</a></li>
        <li><a href="watch.html">WATCH & RATINGS</a></li>
    </ul>
</header>

<section class="ratings-section">

    <!-- HCM (S1 + S2) -->
    <div class="project-block">

        <div class="project-header">
            <img src="HCMRatings.png">
            <div class="project-info">
                <h2>Hypixel Cinematic Montages</h2>
                <h1>Ratings</h1>
            </div>
        </div>

        <div class="overall-rating">
            <h3>Avg. Rating</h3>
            <div class="rating-box">
                <img src="yellowstar.png">
                <span>6.0</span>/10
            </div>
        </div>

        <div class="episode-ratings">
            <h3>Ratings by episode & prologue</h3>
            <div class="ratings-table" id="hcmTable"></div>
        </div>

    </div>

    <!-- PRE-PARTY -->
    <div class="project-block">

        <div class="project-header">
            <img src="PrePartyRatings.png">
            <div class="project-info">
                <h2>Pre-Party</h2>
                <h1>Ratings</h1>
            </div>
        </div>

        <div class="overall-rating">
            <h3>Avg. Rating</h3>
            <div class="rating-box">
                <img src="yellowstar.png">
                <span>5.2</span>/10
            </div>
        </div>

        <div class="episode-ratings">
            <h3>Ratings by episode & prologue</h3>
            <div class="ratings-table" id="preTable"></div>
        </div>

    </div>

    <!-- DAYTONA -->
    <div class="project-block">

        <div class="project-header">
            <img src="DaytonaRatings.png">
            <div class="project-info">
                <h2>Daytona</h2>
                <h1>Ratings</h1>
            </div>
        </div>

        <div class="overall-rating">
            <h3>Avg. Rating</h3>
            <div class="rating-box">
                <img src="redstar.png">
                <span>-</span>/10
            </div>
        </div>

        <div class="episode-ratings">
            <h3>Ratings by episode</h3>
            <div class="ratings-table" id="daytonaTable"></div>
        </div>

    </div>

</section>

<script>
function getRatingColor(score) {
    if (score < 3)   return "#351e4f";
    if (score < 5)   return "#8e0808";
    if (score < 7)   return "#cea502";
    if (score < 8)   return "#1abf2d";
    if (score < 9.5) return "#008236";
    return "#02d2f7";
}

/**
 * Renders one or more seasons into a table container.
 *
 * @param {string} containerId  - ID of the .ratings-table div
 * @param {Array}  seasons      - Array of { label, scores, prologue } objects
 */
function generateMultiSeasonTable(containerId, seasons) {
    const container = document.getElementById(containerId);

    // Build the widest header (longest season)
    const maxEps = Math.max(...seasons.map(s => s.scores.length));
    const headerRow = document.createElement("div");
    headerRow.className = "ratings-header-row";

    for (let i = 0; i < maxEps; i++) {
        const cell = document.createElement("div");
        // Use the first season's prologue setting for header labels
        const usePrologue = seasons[0].prologue;
        cell.textContent = (usePrologue && i === 0) ? "P" : "E" + (usePrologue ? i : i + 1);
        headerRow.appendChild(cell);
    }
    container.appendChild(headerRow);

    // Build each season row
    seasons.forEach(({ label, scores, prologue }) => {
        const row = document.createElement("div");
        row.className = "ratings-row";

        const seasonLabel = document.createElement("div");
        seasonLabel.className = "season-label";
        seasonLabel.textContent = label;
        row.appendChild(seasonLabel);

        // If the table has a prologue column but this season doesn't, add a blank spacer
        const tableHasPrologue = seasons[0].prologue;
        if (tableHasPrologue && !prologue) {
            const spacer = document.createElement("div");
            spacer.style.width = "58px";
            spacer.style.height = "58px";
            spacer.style.flexShrink = "0";
            row.appendChild(spacer);
        }

        scores.forEach((score, i) => {
            const tile = document.createElement("div");
            tile.className = "rating-tile";

            if (score === 0) {
                tile.textContent = "-";
                tile.style.background = "#222";
            } else {
                tile.textContent = score.toFixed(1);
                tile.style.background = getRatingColor(score);
            }

            row.appendChild(tile);
        });

        container.appendChild(row);
    });
}

// HCM — Season 1 + Season 2
generateMultiSeasonTable("hcmTable", [
    { label: "S1", scores: [5.0, 4.6, 8.6, 4.8, 6.9, 6.7, 7.0, 4.7, 6.9, 6.6], prologue: true },
    { label: "S2", scores: [6.7, 4.0, 7.4, 5.6],                                prologue: false }
]);

// Pre-Party — Season 1
generateMultiSeasonTable("preTable", [
    { label: "S1", scores: [2.3, 6.6, 5.5, 4.6, 5.7, 7.1, 7.0], prologue: true }
]);

// Daytona — Season 1 (unreleased)
generateMultiSeasonTable("daytonaTable", [
    { label: "S1", scores: [0, 0, 0, 0, 0, 0, 0, 0, 0], prologue: false }
]);
</script>

</body>
</html>
